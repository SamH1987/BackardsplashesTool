# Render blueprint for Spa Jobs. This file only sets the STARTING configuration
# for a brand new service - once the service exists, Render remembers your
# actual plan/env var choices from the dashboard and this file is only reread
# if you delete and recreate the service. To change plan or env vars on an
# existing service, do it in the Render dashboard, not here.
#
# Video transcription needs real memory to load the speech model - pick an
# instance size with at least 2GB RAM (check Render's current plan list for
# which tier that is; it changes over time) or transcription will crash with
# an out-of-memory error instead of working. Any paid plan removes the
# free-tier sleep-after-15-minutes behaviour, regardless of its RAM size.
services:
  - type: web
    name: spa-jobs
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/meta
    envVars:
      - key: CLOUD
        value: "1"
      - key: DATABASE_URL # Supabase -> Connect -> Session pooler connection string
        sync: false
      - key: SUPABASE_URL # Supabase -> Settings -> API -> Project URL
        sync: false
      - key: SUPABASE_SERVICE_KEY # Supabase -> Settings -> API -> service_role key
        sync: false
      - key: APP_PASSWORD # the team login password you choose
        sync: false
