<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>3D view - Spa Jobs</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0e5f76; }
    #canvas-wrap { position: fixed; inset: 0; }
    canvas { display: block; }
    #hud { position: fixed; top: 0; left: 0; right: 0; padding: 10px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; pointer-events: none; }
    #hud > * { pointer-events: auto; }
    .hud-title { background: rgba(14, 35, 42, .8); color: #fff; padding: 8px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; }
    .hud-btn { background: #0e5f76; color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 15px; font-weight: 600; cursor: pointer; min-height: 42px; text-decoration: none; display: inline-block; }
    .hud-btn.secondary { background: rgba(14, 35, 42, .8); }
    #legend { position: fixed; bottom: 12px; left: 12px; background: rgba(14, 35, 42, .82); color: #fff; padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.7; max-width: 300px; }
    #legend b { display: block; font-size: 14px; }
    .sw { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 7px; vertical-align: -1px; }
    #err { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; color: #fff; padding: 30px; text-align: center; font-size: 17px; }

    #panel { position: fixed; top: 64px; right: 12px; width: 250px; max-height: calc(100% - 140px); overflow-y: auto;
      background: rgba(14, 35, 42, .88); color: #fff; border-radius: 12px; padding: 14px; display: none; }
    #panel.open { display: block; }
    #panel h4 { margin: 12px 0 4px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #9fc4d0; }
    #panel h4:first-child { margin-top: 0; }
    #panel .prow { display: flex; gap: 6px; margin: 4px 0; align-items: center; }
    #panel label { font-size: 13px; flex: 1; }
    #panel input[type=number], #panel input[type=text], #panel select { width: 74px; padding: 6px; border-radius: 7px; border: none; font-size: 14px; }
    #panel input[type=text], #panel select { width: 100%; }
    #panel input[type=checkbox] { width: 19px; height: 19px; }
    #panel .save-btn { width: 100%; margin-top: 12px; background: #2e9cc4; border: none; color: #fff; font-weight: 700; padding: 11px; border-radius: 9px; font-size: 14px; cursor: pointer; }
    #panel .note { font-size: 11.5px; color: #9fc4d0; line-height: 1.5; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="canvas-wrap"></div>
  <div id="hud">
    <span class="hud-title" id="title">3D view</span>
    <button class="hud-btn secondary" id="btn-panel">Adjust the design</button>
    <button class="hud-btn secondary" id="btn-rot-l" title="Rotate left">&#8678; Rotate</button>
    <button class="hud-btn secondary" id="btn-rot-r" title="Rotate right">Rotate &#8680;</button>
    <button class="hud-btn secondary" id="btn-spin">Spin</button>
    <button class="hud-btn" id="btn-scan" style="display:none">Show the real yard</button>
    <button class="hud-btn secondary" id="btn-move" style="display:none">Move spa</button>
    <button class="hud-btn secondary" id="btn-turn">Turn spa</button>
    <button class="hud-btn" id="btn-vr" style="display:none">Put it in VR</button>
    <button class="hud-btn" id="btn-ar" style="display:none">See it in YOUR yard (AR)</button>
    <a class="hud-btn secondary" id="btn-back" href="/">Back to the job</a>
  </div>

  <div id="panel">
    <h4>Spa</h4>
    <div class="prow"><label>Length (m)</label><input type="number" step="0.1" id="p-spaL"></div>
    <div class="prow"><label>Width (m)</label><input type="number" step="0.1" id="p-spaW"></div>
    <div class="prow"><label>Depth/height (m)</label><input type="number" step="0.05" id="p-spaH"></div>
    <div class="prow"><label>Sitting</label><select id="p-inground" style="width:130px"><option value="in">In the ground</option><option value="semi">Semi in-ground</option><option value="above">Above ground</option></select></div>
    <h4>Slab / surrounds</h4>
    <div class="prow"><label>Slab length (m)</label><input type="number" step="0.1" id="p-slabL"></div>
    <div class="prow"><label>Slab width (m)</label><input type="number" step="0.1" id="p-slabW"></div>
    <h4>Decking</h4>
    <div class="prow"><label>Deck length (m)</label><input type="number" step="0.1" id="p-deckL"></div>
    <div class="prow"><label>Deck width (m)</label><input type="number" step="0.1" id="p-deckW"></div>
    <div class="prow"><label>Placement</label><select id="p-deckPlace" style="width:130px">
      <option value="front">In front</option><option value="around">All around</option>
      <option value="left">Left side</option><option value="right">Right side</option>
      <option value="behind">Behind</option></select></div>
    <div class="prow"><label>Boards</label><select id="p-deckBoard" style="width:130px"><option value="">Standard timber</option></select></div>
    <h4>Dress it up</h4>
    <div class="prow"><label>Catalogue photo as spa top</label><input type="checkbox" id="p-phototop" checked></div>
    <div class="prow"><label>Landscaping (hedges, plants)</label><input type="checkbox" id="p-landscape" checked></div>
    <div class="prow"><label>Loungers &amp; umbrella</label><input type="checkbox" id="p-furniture" checked></div>
    <div class="prow"><label>Stepping stones</label><input type="checkbox" id="p-stones" checked></div>
    <button class="save-btn" id="p-save">Save these sizes to the job</button>
    <p class="note">Play with it freely - nothing changes until you hit Save. Save writes the spa, slab and deck sizes into this job's survey measurements, so the quote uses the same numbers.</p>
  </div>

  <div id="legend"></div>
  <div id="err"></div>
  <script src="vendor/three.min.js"></script>
  <script src="vendor/GLTFLoader.js"></script>
  <script src="3d.js"></script>
</body>
</html>
